name: "Observability Platform"
 
on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
 
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
 
  # Permite lanzar el workflow manualmente desde GitHub UI
  workflow_dispatch:
    inputs:
      action:
        description: "Acción Terraform a ejecutar"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
 
# Evita ejecuciones concurrentes para el mismo entorno
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false
 
env:
  TF_VERSION: "1.8.0"
  TF_WORKING_DIR: "./terraform"
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
 
jobs:
  # ================================================================
  # JOB 1: Validación y formateo del código Terraform
  # ================================================================
  validate:
    name: "Validate & Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
 
    steps:
      - name: "Checkout código"
        uses: actions/checkout@v4
 
      - name: "Instalar Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: "Terraform Format Check"
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true
 
      - name: "Terraform Init (solo validación)"
        id: init
        run: |
          terraform init \
            -backend=false \
            -input=false
 
      - name: "Terraform Validate"
        id: validate
        run: terraform validate -no-color
 
      # Comenta el resultado en Pull Requests
      - name: "Comentar PR con resultado de validación"
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### Terraform Format: \`${{ steps.fmt.outcome }}\`
            #### Terraform Init: \`${{ steps.init.outcome }}\`
            #### Terraform Validate: \`${{ steps.validate.outcome }}\`
 
            *Triggered by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
 
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
 
  # ================================================================
  # JOB 2: Terraform Plan
  # ================================================================
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
 
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
 
    steps:
      - name: "Checkout código"
        uses: actions/checkout@v4
 
      - name: "Instalar Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true
 
      - name: "Login Azure CLI"
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }
 
      - name: "Terraform Init"
        id: init
        run: |
          terraform init \
            -input=false \
            -no-color
            
      - name: "Terraform Plan"
        id: plan
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -out=tfplan
        continue-on-error: true
 
      # Guarda el plan como artefacto para usarlo en Apply
      - name: "Guardar Plan como artefacto"
        uses: actions/upload-artifact@v4
        if: steps.plan.outputs.exitcode == 2
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 5
 
      - name: "Mostrar salida del Plan"
        run: |
          terraform show -no-color tfplan
        if: steps.plan.outputs.exitcode == 2
 
      # Comentar el plan en Pull Requests
      - name: "Comentar PR con Terraform Plan"
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const plan = process.env.PLAN.length > 60000
              ? process.env.PLAN.substring(0, 60000) + "\n... (truncado)"
              : process.env.PLAN;
 
            const output = `#### Terraform Plan \`${{ steps.plan.outcome }}\`
 
            <details><summary>Ver Plan Completo</summary>
 
            \`\`\`terraform
            ${plan}
            \`\`\`
 
            </details>
 
            *Triggered by: @${{ github.actor }}*`;
 
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
 
      - name: "Fallo si Plan tiene errores"
        if: steps.plan.outputs.exitcode == 1
        run: exit 1
 
  # ================================================================
  # JOB 3: Terraform Apply (solo en main o workflow_dispatch)
  # ================================================================
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: plan
    # Solo aplica en push a main, o si se lanzó manualmente con "apply"
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.plan.outputs.plan_exitcode == 2) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment:
      name: production
      # Requiere aprobación manual
 
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
 
    steps:
      - name: "Checkout código"
        uses: actions/checkout@v4
 
      - name: "Instalar Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: "Login Azure CLI"
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }
 
      - name: "Terraform Init"
        run: terraform init -input=false -no-color
 
      - name: "Descargar Plan guardado"
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true
 
      - name: "Terraform Apply"
        run: |
          if [ -f tfplan ]; then
            echo "▶ Aplicando plan guardado..."
            terraform apply -input=false -no-color tfplan
          else
            echo "▶ No hay plan guardado, ejecutando apply directo..."
            terraform apply -input=false -no-color -auto-approve
          fi
 
      - name: "Mostrar Outputs"
        run: terraform output -no-color
 
  # ================================================================
  # JOB 4: Terraform Destroy (solo manual)
  # ================================================================
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment:
      name: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
 
    steps:
      - name: "Checkout código"
        uses: actions/checkout@v4
 
      - name: "Instalar Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: "Login Azure CLI"
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }
 
      - name: "Terraform Init"
        run: terraform init -input=false -no-color
 
      - name: "Terraform Destroy"
        run: |
          terraform destroy \
            -input=false \
            -no-color \
            -auto-approve
